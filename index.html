<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venstre Syddjurs PWA Prototype</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="text-[#0B132B]">

    <!-- APP CONTAINER (Max-W for desktop, full screen på mobil) -->
    <div id="app-root" class="max-w-md mx-auto min-h-screen bg-white flex flex-col relative shadow-xl">
        <!-- Dynamisk indhold indlæses her via JS -->
    </div>

    <script>
        // App State
        let currentTab = 'hjem';
        let activeCategory = 'Alle';

        // Konstanter / Farvepalette fra designguiden
        const COLORS = {
            darkBlue: '#0B132B',
            primaryBlue: '#1D4ED8',
            green: '#22C55E',
            purple: '#7C3AED',
            pink: '#EC4899',
            orange: '#F59E0B'
        };

        // DOKUMENTATION FOR UDSKIFTNING AF INDHOLD (PLACEHOLDERS)
        // Rediger arrayerne nedenfor for at opdatere med rigtige lokale data fra Venstre Syddjurs.
        
        const LOCAL_NEWS = [
            {
                id: 1,
                category: 'LOKALUDVIKLING',
                title: 'Stærkere sammenhæng mellem land og by i Syddjurs',
                text: 'Venstre Syddjurs vil sikre, at vores lokalsamfund fra Nimtofte til Knebel har gode rammer, stærke folkeskoler og velfungerende infrastruktur.',
                date: '3. juli 2026',
                image: 'https://images.unsplash.com/photo-1573164713988-8665fc963095?auto=format&fit=crop&w=600&q=80',
                tagColor: COLORS.purple
            },
            {
                id: 2,
                category: 'ERHVERVSLIV',
                title: 'Nye erhvervsarealer skal tiltrække arbejdspladser',
                text: 'Vi skal gøre det nemmere og mere attraktivt at drive virksomhed i Syddjurs Kommune. Mindre bureaukrati og hurtigere sagsbehandling.',
                date: '1. juli 2026',
                image: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=600&q=80',
                tagColor: COLORS.green
            },
            {
                id: 3,
                category: 'TURISME',
                title: 'Bæredygtig turismeudvikling på Mols og Helgenæs',
                text: 'Turismen er et af vores vigtigste erhverv. Vi ønsker at styrke rammerne for turisme, samtidig med at vi værner om vores unikke natur.',
                date: '28. juni 2026',
                image: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=600&q=80',
                tagColor: COLORS.orange
            }
        ];

        const LOCAL_EVENTS = [
            { id: 1, day: '12', month: 'AUG', title: 'Politisk Sommercafé i Ebeltoft', time: 'Kl. 19:00', location: 'Ebeltoft Kulturhus', bg: 'from-pink-500 to-rose-600' },
            { id: 2, day: '05', month: 'SEP', title: 'Debat: Fremtidens folkeskole i Syddjurs', time: 'Kl. 17:30', location: 'Rønde Idrætscenter', bg: 'from-emerald-500 to-teal-600' },
            { id: 3, day: '22', month: 'SEP', title: 'Generalforsamling & Medlemsmøde', time: 'Kl. 19:30', location: 'Kolind Pakhus', bg: 'from-blue-500 to-indigo-600' }
        ];

        const LOCAL_VIDEOS = [
            { id: 1, title: 'Velkommen til Venstre Syddjurs - Hør vores vision for kommunen', duration: '03:15', date: '30. juni 2026', main: true, image: 'https://images.unsplash.com/photo-1540575467063-178a50c2df87?auto=format&fit=crop&w=800&q=80' },
            { id: 2, title: 'Interview: Hvorfor investere mere i lokal infrastruktur?', duration: '01:45', image: 'https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&w=300&q=80' },
            { id: 3, title: 'Kort oprids: Vores 3 hovedprioriteter i budgetforhandlingerne', duration: '02:10', image: 'https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&w=300&q=80' }
        ];

        // Render-funktioner
        function renderApp() {
            const root = document.getElementById('app-root');
            root.className = "max-w-md mx-auto min-h-screen bg-white flex flex-col relative shadow-xl pb-24";
            
            let contentHtml = '';

            // 1. TOP HEADER (Ensartet på tværs af hovedfaner)
            if (currentTab !== 'mere_page') {
                contentHtml += `
                    <div class="p-4 flex justify-between items-center bg-white sticky top-0 z-40 border-b border-slate-50">
                        <div class="flex items-center gap-2">
                            <span class="text-3xl font-black text-blue-700 tracking-tighter" style="color: ${COLORS.primaryBlue}">V</span>
                            <div class="flex flex-col">
                                <span class="text-xs font-black tracking-wider text-slate-400 uppercase leading-none">Venstre</span>
                                <span class="text-sm font-bold text-[#0B132B] leading-tight">Syddjurs</span>
                            </div>
                        </div>
                        <button class="p-2 hover:bg-slate-100 rounded-full transition relative">
                            <i data-lucide="bell" class="w-5 h-5 text-slate-700"></i>
                            <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
                        </button>
                    </div>
                `;
            }

            // 2. SKÆRM-INDHOLD BASERET PÅ AKTUEL TAB
            if (currentTab === 'hjem') {
                const mainNews = LOCAL_NEWS[0];
                contentHtml += `
                    <!-- Stor Hero Karrusel / Nyhedskort -->
                    <div class="p-4">
                        <div class="rounded-3xl overflow-hidden relative shadow-lg text-white aspect-[4/5] flex flex-col justify-end p-6 bg-cover bg-center transition transform active:scale-[0.99]" 
                             style="background-image: linear-gradient(to top, rgba(11, 19, 43, 0.95), rgba(11, 19, 43, 0.3)), url('${mainNews.image}')">
                            <span class="absolute top-4 left-4 text-xs font-bold uppercase tracking-wider px-2.5 py-1 rounded-full" style="background-color: ${COLORS.primaryBlue}">Fokus</span>
                            <span class="absolute top-4 right-4 text-xs text-slate-300">${mainNews.date}</span>
                            
                            <h2 class="text-2xl font-bold leading-tight mb-2">${mainNews.title}</h2>
                            <p class="text-sm text-slate-300 mb-4 font-light line-clamp-2">${mainNews.text}</p>
                            
                            <button onclick="switchTab('nyt')" class="self-start bg-white text-slate-900 text-sm font-semibold px-5 py-2.5 rounded-full flex items-center gap-2 hover:bg-slate-100 transition shadow-sm">
                                Læs mere <i data-lucide="chevron-right" class="w-4 h-4"></i>
                            </button>

                            <div class="flex justify-center gap-1.5 mt-6">
                                <span class="w-2 h-2 rounded-full bg-white"></span>
                                <span class="w-2 h-2 rounded-full bg-white/40"></span>
                                <span class="w-2 h-2 rounded-full bg-white/40"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Hurtig overblik info-bjælker (Fra bunden af referencebillede) -->
                    <div class="px-4 mb-6 grid grid-cols-2 gap-2">
                        <div class="bg-blue-50/50 p-3 rounded-2xl border border-blue-100/50 flex flex-col gap-1">
                            <div class="flex items-center gap-2 text-blue-700">
                                <i data-lucide="zap" class="w-4 h-4"></i>
                                <span class="text-xs font-bold">Hurtigt overblik</span>
                            </div>
                            <span class="text-[11px] text-slate-500 leading-tight">Få de vigtigste lokale nyheder på få sekunder.</span>
                        </div>
                        <div class="bg-emerald-50/50 p-3 rounded-2xl border border-emerald-100/50 flex flex-col gap-1">
                            <div class="flex items-center gap-2 text-emerald-700">
                                <i data-lucide="users" class="w-4 h-4"></i>
                                <span class="text-xs font-bold">Din stemme</span>
                            </div>
                            <span class="text-[11px] text-slate-500 leading-tight">Deltag i debatter og mød dine lokale kandidater.</span>
                        </div>
                    </div>

                    <!-- Sektion: Det Sker -->
                    <div class="mb-6">
                        <div class="px-4 flex justify-between items-center mb-3">
                          <h3 class="text-lg font-bold text-slate-900">Det sker i Syddjurs</h3>
                          <button onclick="switchTab('kalender')" class="text-xs font-semibold text-blue-600 hover:underline" style="color: ${COLORS.primaryBlue}">Se alle</button>
                        </div>

                        <div class="flex gap-3 overflow-x-auto px-4 pb-2 snap-x hide-scrollbar">
                          ${LOCAL_EVENTS.map(event => `
                            <div class="w-[140px] shrink-0 rounded-2xl bg-gradient-to-br ${event.bg} p-3 text-white flex flex-col justify-between h-[160px] shadow-sm snap-start">
                              <div>
                                <span class="block text-2xl font-black leading-none">${event.day}</span>
                                <span class="text-xs font-bold tracking-wider opacity-90">${event.month}</span>
                              </div>
                              <div>
                                <p class="text-xs font-bold leading-tight mb-1 line-clamp-2">${event.title}</p>
                                <span class="text-[10px] bg-black/25 px-1.5 py-0.5 rounded-sm inline-block truncate w-full"><i data-lucide="map-pin" class="w-2 h-2 inline mr-0.5"></i>${event.location}</span>
                              </div>
                            </div>
                          `).join('')}
                        </div>
                    </div>
                `;
            } 
            
            else if (currentTab === 'nyt') {
                contentHtml += `
                    <div class="p-4">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-2xl font-bold text-slate-900">Lokale Nyheder</h2>
                            <button class="p-2 hover:bg-slate-100 rounded-full"><i data-lucide="search" class="w-5 h-5 text-slate-700"></i></button>
                        </div>

                        <!-- Kategorier -->
                        <div class="flex gap-2 overflow-x-auto pb-3 mb-2 hide-scrollbar">
                            ${['Alle', 'Politik', 'Erhverv', 'Klima', 'Turisme'].map(cat => `
                                <button onclick="activeCategory='${cat}'; renderApp();" 
                                    class="px-4 py-1.5 rounded-full text-xs font-semibold transition shrink-0 ${activeCategory === cat ? 'bg-blue-600 text-white shadow-sm' : 'bg-slate-100 text-slate-600'}"
                                    ${activeCategory === cat ? `style="background-color: ${COLORS.primaryBlue}"` : ''}>
                                    ${cat}
                                </button>
                            `).join('')}
                        </div>

                        <!-- Nyhedsliste -->
                        <div class="space-y-4">
                            ${LOCAL_NEWS.map(item => `
                                <div class="bg-white rounded-2xl overflow-hidden shadow-xs border border-slate-100 flex flex-col">
                                    <div class="h-48 bg-cover bg-center relative" style="background-image: url('${item.image}')">
                                        <span class="absolute bottom-3 left-3 text-[10px] font-bold tracking-wider uppercase px-2 py-0.5 rounded-sm text-white" style="background-color: ${item.tagColor}">
                                            ${item.category}
                                        </span>
                                    </div>
                                    <div class="p-4">
                                        <span class="text-xs text-slate-400 block mb-1">${item.date} • Venstre Syddjurs</span>
                                        <h3 class="font-bold text-slate-900 text-base leading-snug mb-2">${item.title}</h3>
                                        <p class="text-xs text-slate-500 leading-relaxed mb-4 line-clamp-2">${item.text}</p>
                                        <button class="w-full py-2 bg-slate-50 hover:bg-slate-100 text-slate-700 text-xs font-semibold rounded-xl flex items-center justify-center gap-1 transition">
                                            Læs fulde artikel <i data-lucide="chevron-right" class="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } 
            
            else if (currentTab === 'kalender') {
                contentHtml += `
                    <div class="p-4">
                        <h2 class="text-2xl font-bold text-slate-900 mb-4">Aktivitetskalender</h2>
                        <p class="text-xs text-slate-500 mb-4">Kom med til vores lokale arrangementer, åbne møder og politiske caféer i Syddjurs Kommune.</p>
                        <div class="space-y-3">
                            ${LOCAL_EVENTS.map(event => `
                                <div class="flex bg-white rounded-2xl p-4 border border-slate-100 shadow-xs gap-4 items-center">
                                    <div class="w-14 h-14 rounded-xl bg-gradient-to-br ${event.bg} flex flex-col items-center justify-center text-white shrink-0">
                                        <span class="text-xl font-black leading-none">${event.day}</span>
                                        <span class="text-[10px] font-bold tracking-wider opacity-90">${event.month}</span>
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <h4 class="font-bold text-slate-900 text-sm leading-tight truncate">${event.title}</h4>
                                        <div class="flex flex-col gap-0.5 mt-1 text-slate-400 text-xs">
                                            <span class="flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3"></i>${event.time}</span>
                                            <span class="flex items-center gap-1 truncate"><i data-lucide="map-pin" class="w-3 h-3"></i>${event.location}</span>
                                        </div>
                                    </div>
                                    <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300 shrink-0"></i>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } 
            
            else if (currentTab === 'video') {
                const mainVideo = LOCAL_VIDEOS[0];
                contentHtml += `
                    <div class="p-4">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-2xl font-bold text-slate-900">Video & Taler</h2>
                            <button class="p-2 hover:bg-slate-100 rounded-full"><i data-lucide="search" class="w-5 h-5 text-slate-700"></i></button>
                        </div>

                        <!-- Hovedvideo -->
                        <div class="mb-6 bg-white rounded-2xl overflow-hidden shadow-xs border border-slate-100">
                            <div class="aspect-video bg-cover bg-center relative flex items-center justify-center" style="background-image: linear-gradient(to top, rgba(0,0,0,0.5), transparent), url('${mainVideo.image}')">
                                <button class="w-14 h-14 bg-white/95 rounded-full flex items-center justify-center shadow-md hover:scale-105 transition text-blue-600 pl-1">
                                    <i data-lucide="play" class="w-6 h-6 fill-current" style="color: ${COLORS.primaryBlue}"></i>
                                </button>
                                <span class="absolute bottom-3 right-3 bg-black/70 text-white text-[10px] font-mono px-1.5 py-0.5 rounded-sm">${mainVideo.duration}</span>
                                <span class="absolute top-3 left-3 bg-blue-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-xs uppercase">Seneste</span>
                            </div>
                            <div class="p-4">
                                <span class="text-xs text-slate-400 block mb-1">${mainVideo.date} • Venstre Syddjurs</span>
                                <h3 class="font-bold text-slate-900 text-base leading-tight">${mainVideo.title}</h3>
                            </div>
                        </div>

                        <!-- Liste over øvrige videoer -->
                        <h4 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3">Flere klip</h4>
                        <div class="space-y-3">
                            ${LOCAL_VIDEOS.slice(1).map(video => `
                                <div class="flex gap-3 bg-white p-2 rounded-xl border border-slate-100 items-center">
                                    <div class="w-24 h-16 bg-cover bg-center rounded-lg relative shrink-0 flex items-center justify-center" style="background-image: url('${video.image}')">
                                        <div class="w-6 h-6 bg-white/90 rounded-full flex items-center justify-center text-slate-900 pl-0.5">
                                            <i data-lucide="play" class="w-3 h-3 fill-current text-slate-700"></i>
                                        </div>
                                        <span class="absolute bottom-1 right-1 bg-black/70 text-white text-[8px] font-mono px-1 rounded-xs">${video.duration}</span>
                                    </div>
                                    <div class="flex-1">
                                        <h5 class="text-xs font-bold text-slate-900 leading-snug line-clamp-2">${video.title}</h5>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } 
            
            else if (currentTab === 'mere') {
                // Strukturere menuen præcis som anmodet under punkt 4
                const menuItems = [
                    { id: 'maerkesager', label: 'Mærkesager', icon: 'award', desc: 'Vores politiske prioriteter for kommunen' },
                    { id: 'kandidater', label: 'Kandidater', icon: 'user-check', desc: 'Mød dit lokale Venstre-hold til kommunalvalget' },
                    { id: 'bestyrelse', label: 'Bestyrelse', icon: 'briefcase', desc: 'Hvem står bag Venstre Syddjurs' },
                    { id: 'medlem', label: 'Bliv medlem', icon: 'user-plus', desc: 'Støt det lokale arbejde og få indflydelse' },
                    { id: 'kontakt', label: 'Kontakt', icon: 'mail', desc: 'Skriv eller ring til os i lokalforeningen' },
                    { id: 'gdpr', label: 'Privatliv / GDPR', icon: 'shield-check', desc: 'Sådan passer vi på dine data' }
                ];

                contentHtml += `
                    <div class="p-4">
                        <div class="bg-gradient-to-r from-blue-700 to-indigo-800 rounded-2xl p-5 text-white mb-6 shadow-sm">
                            <span class="text-xs uppercase font-bold tracking-wider opacity-75">Lokalforeningen</span>
                            <h2 class="text-xl font-bold mt-0.5">Venstre Syddjurs</h2>
                            <p class="text-xs text-blue-100 mt-2 font-light leading-relaxed">Velkommen til vores PWA-app. Her kan du dykke dybere ned i vores organisation, finde kontaktpersoner og læse om vores mærkesager.</p>
                        </div>

                        <div class="space-y-2">
                            ${menuItems.map(item => `
                                <button onclick="openSubPage('${item.id}', '${item.label}')" class="w-full flex items-center justify-between p-4 bg-white hover:bg-slate-50 border border-slate-100 rounded-xl transition text-left active:scale-[0.99]">
                                    <div class="flex items-center gap-3 min-w-0">
                                        <div class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center text-blue-600 shrink-0">
                                            <i data-lucide="${item.icon}" class="w-5 h-5"></i>
                                        </div>
                                        <div class="min-w-0">
                                            <span class="block font-bold text-slate-900 text-sm">${item.label}</span>
                                            <span class="block text-[11px] text-slate-400 truncate">${item.desc}</span>
                                        </div>
                                    </div>
                                    <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300 shrink-0"></i>
                                </button>
                            `).join('')}
                        </div>

                        <div class="mt-8 text-center">
                            <span class="text-[10px] text-slate-300 block">Venstre Syddjurs App Prototype v2.0</span>
                            <span class="text-[10px] text-slate-300 block mt-0.5">Klar til PWA installation</span>
                        </div>
                    </div>
                `;
            } 
            
            else if (currentTab === 'mere_page') {
                // Dynamisk sub-page visning for Mere-menuen med placeholders
                contentHtml += `
                    <div class="p-4 bg-white sticky top-0 z-40 border-b border-slate-50 flex items-center gap-3">
                        <button onclick="switchTab('mere')" class="p-2 hover:bg-slate-100 rounded-full transition">
                            <i data-lucide="arrow-left" class="w-5 h-5 text-slate-700"></i>
                        </button>
                        <h3 class="font-bold text-lg text-slate-900" id="subpage-title">Menupunkt</h3>
                    </div>
                    <div class="p-5" id="subpage-content">
                        <!-- Indholdet genereres i openSubPage -->
                    </div>
                `;
            }

            // 3. FAST BUNDNAVIGATION (Præcis som punkt 3 & 6)
            contentHtml += `
                <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-slate-100 px-4 pt-2 pb-5 flex justify-between items-center z-50 shadow-lg">
                    <button onclick="switchTab('hjem')" class="flex flex-col items-center gap-1 flex-1 transition ${currentTab === 'hjem' ? 'text-blue-600 font-bold' : 'text-slate-400'}">
                        <i data-lucide="home" class="w-5 h-5"></i>
                        <span class="text-[10px]">Hjem</span>
                    </button>
                    <button onclick="switchTab('nyt')" class="flex flex-col items-center gap-1 flex-1 transition ${currentTab === 'nyt' ? 'text-blue-600 font-bold' : 'text-slate-400'}">
                        <i data-lucide="newspaper" class="w-5 h-5"></i>
                        <span class="text-[10px]">Nyheder</span>
                    </button>
                    <button onclick="switchTab('kalender')" class="flex flex-col items-center gap-1 flex-1 transition ${currentTab === 'kalender' ? 'text-blue-600 font-bold' : 'text-slate-400'}">
                        <i data-lucide="calendar" class="w-5 h-5"></i>
                        <span class="text-[10px]">Kalender</span>
                    </button>
                    <button onclick="switchTab('video')" class="flex flex-col items-center gap-1 flex-1 transition ${currentTab === 'video' ? 'text-blue-600 font-bold' : 'text-slate-400'}">
                        <i data-lucide="video" class="w-5 h-5"></i>
                        <span class="text-[10px]">Video</span>
                    </button>
                    <button onclick="switchTab('mere')" class="flex flex-col items-center gap-1 flex-1 transition ${(currentTab === 'mere' || currentTab === 'mere_page') ? 'text-blue-600 font-bold' : 'text-slate-400'}">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                        <span class="text-[10px]">Mere</span>
                    </button>
                </div>
            `;

            root.innerHTML = contentHtml;
            lucide.createIcons();
            window.scrollTo(0, 0);
        }

        function switchTab(tabId) {
            currentTab = tabId;
            renderApp();
        }

        // Sub-page indholdsskabeloner til Mere-menuen (Skift ud med rigtige tekster her)
        function openSubPage(pageId, title) {
            currentTab = 'mere_page';
            renderApp();
            
            document.getElementById('subpage-title').innerText = title;
            const container = document.getElementById('subpage-content');
            
            let html = '';
            
            if (pageId === 'maerkesager') {
                html = `
                    <div class="space-y-4">
                        <p class="text-sm text-slate-600 leading-relaxed font-medium">Her er vores foreløbige politiske mærkesager for Venstre Syddjurs. (Kan tilpasses i koden under <code>maerkesager</code> placeholderen):</p>
                        <div class="border-l-4 border-blue-600 pl-3 py-1">
                            <h4 class="font-bold text-sm text-slate-900">1. Skattestop og sund økonomi</h4>
                            <p class="text-xs text-slate-500 mt-0.5">Syddjurs skal styres ansvarligt uden unødige skattestigninger for borgerne.</p>
                        </div>
                        <div class="border-l-4 border-emerald-500 pl-3 py-1">
                            <h4 class="font-bold text-sm text-slate-900">2. Styrket nærvær i folkeskolen</h4>
